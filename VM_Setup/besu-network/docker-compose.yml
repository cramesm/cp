services:
  besu:
    image: hyperledger/besu:25.3.0
    container_name: besu-node
    command:
      - --genesis-file=/config/genesis.json
      - --data-path=/var/lib/besu
      - --node-private-key-file=/var/lib/besu/key
      - --rpc-http-enabled=true
      - --rpc-http-host=0.0.0.0
      - --rpc-http-port=8545
      - --rpc-http-cors-origins=*
      - --rpc-http-api=ETH,NET,WEB3,CLIQUE
      - --host-allowlist=*
      - --min-gas-price=0
    ports:
      - "8545:8545"
      - "30303:30303"
    volumes:
      - ./genesis.json:/config/genesis.json
      - ./node1:/var/lib/besu